name: Bug report
description: Report something that is broken.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps or a small sample project.
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Package or repository
      placeholder: barq-js, barq-kotlin, barq-core, barq-native
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS, iOS, Android, Node.js, React Native
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
